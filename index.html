<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>키패드 감지 테스트</title>

</head>

<body>

  <h1>키패드 열림/닫힘 테스트</h1>



  <input type="text" placeholder="여기에 텍스트를 입력해보세요" id="inputField">



  <script>

    // 원래 화면 높이 저장

    let originalHeight = window.innerHeight;



    // 화면 크기 변화 감지

    window.addEventListener("resize", () => {

      if (window.innerHeight < originalHeight) {

        console.log("키패드 열림 추정");

      } else {

        console.log("키패드 닫힘 추정");

      }

    });

  </script>

</body>

</html>
