<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {font-size:62.5%;}
        *{box-sizing:border-box;padding:0;margin:0;font-family:"맑은 고딕", "Malgun Gothic", sans-serif;}
        html, body{height:100%;max-width:100vw;letter-spacing:-0.01em;}
        body, div, dl, dt, dd, ul, ol, li, h1, h2, h3, h4, h5, form, fieldset, legend, p, blockquote, th, td, input, select, textarea, button {
            margin:0;padding:0;
        }
        fieldset, img{border:0 none;}
        dl, ul, ol, menu, li{list-style:none;}
        input, select, textarea, button{outline:0;font-size:100%;vertical-align:middle;}
        button{border:0 none;background-color:transparent;cursor:pointer;}
        table{border-collapse:collapse;border-spacing:0;border-style:hidden;}
        body{-webkit-text-size-adjust:none;background:#fff;}
        body, th, td, input, select, textarea, button{font-size:1.4rem;line-height:160%;color:#222;}
        input[type=text], input[type=password], input[type=search]{appearance:none;-webkit-appearance:none;border-radius:0;caret-color:#222;}
        input[type=checkbox], input[type=radio] {appearance:none;-webkit-appearance:none;}
        select::-ms-expand{display:none;}
        ::selection{background:#ff9433;color:#fff;}
        
        #wrap, section, article{width:100%;}
        .inner{width:100%;height:100%;display:flex;flex-direction:column;margin:0 auto;}

        .header{width:100%;position:sticky;top:0;z-index:100;background-color:#fff;border-bottom:1px solid #fafafb;}
        .header .header_inner{display:flex;gap:0.5rem;margin:0 auto;min-height:5.6rem;align-items:center;width:100%;padding:0.8rem;}
        .header .header_left, .header .header_right{min-width:4rem;}
        .header .header_title{line-height:140%;font-size:1.8rem;font-weight:600;flex:1;color:#222;text-align:center;}

        .content{width:100%;flex:1;padding:2rem 2rem 5.6rem;margin-bottom:2rem;overflow-y:auto;}

        .chat, .chat_list{height:100%;}

        .chat_list li{display:flex;flex-direction:column;margin-bottom:20px;}
        .chat_list .question{display:flex;justify-content:flex-end;}
        .chat_list .question > span{width:auto;display:inline-block;max-width:80%;padding:0.3rem 1rem;text-align:center;border-radius:1.6rem;background:#b4b4b4;color:#222;}
        .chat_list .answer{overflow-x:hidden;margin-top:1rem;}

        .chat_input{display:flex;gap:0.5rem;margin:0 auto;min-height:5.6rem;justify-content:space-between;align-items:center;width:100%;padding:0.8rem;background:#fff;}
        .chat_input input{flex:1;}
        .chat_input button{width:3rem;height:100%;text-align:center;}
    </style>
</head>
<body id="wrap">
    <div class="inner">
        <header class="header">
            <div class="header_inner">
                <div class="header_left"></div>
                <div class="header_title">Test</div>
                <div class="header_right"></div>
            </div>
        </header>

        <main class="content">
            <section class="chat">
                <ul class="chat_list">
                    <li class="chat_item">
                        <div class="question">
                            <p>질문샘플</p>
                        </div>
                        <div class="answer">
                            <h3>대답 샘플</h3>
                            <p>대답 샘플입니다.</p>
                        </div>
                    </li>
                </ul>
            </section>
        </main>

        <footer class="footer">
            <div class="chat_input">
                <input type="text" id="chatInput" name="chatInput" placeholder="text">
                <button type="button" class="btn_chat" id="btnChat">▲</button>
            </div>
        </footer>
    </div>

    <script>
        (function(){
            const chatContent = document.querySelector('.content');
            const chatList = document.querySelector('.chat_list');
            const chatInput = document.querySelector('#chatInput');
            const chatBtn = document.querySelector('#btnChat');

            chatBtn.addEventListener('click', function(e) {
                createChat();
            });

            /*
            chatBtn.addEventListener('keypress', function(e) {
                if(e.key === 'Enter') createChat();
            });
            */

            function createChat() {
                const inputText = chatInput.value.trim();
                if(!inputText) return;

                const qText = `
                    <div class="question">
                        <span>${inputText}</span>
                    </div>
                `;

                const aiAnwser = `
                    <div class="answer">
                        <h3>AI Answer</h3>
                        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit.</p>
                    </div>
                `;

                const preLI = document.querySelectorAll('.chat_list li');
                if(preLI && preLI.length > 0) {
                    preLI.forEach(function(item) {
                        item.style.height = '';
                    });
                }

                const li = document.createElement('li');
                li.className = 'chat_item';
                li.style.height = '100dvh';
                li.innerHTML = qText + aiAnswer;

                chatList.appendChild(li);
                //chatList.scrollTop = chatList.scrollHeight;

                li.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });

                /*
                requestAnimationFrame(() => {
                    chatList.scrollTop = li.offsetTop;
                });
                */

                console.log(chatList.scrollTop);

                chatInput.value = '';
                chatInput.focus();
            }
        })();
    </script>
</body>
</html>
